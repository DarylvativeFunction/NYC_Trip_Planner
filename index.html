<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>NYC ’26</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="NYC ’26" />
<meta name="theme-color" content="#FFFFFF" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23000'/%3E%3Ctext x='90' y='84' font-family='-apple-system,Helvetica,Arial' font-size='34' font-weight='700' fill='%23fff' text-anchor='middle'%3ENYC%3C/text%3E%3Ctext x='90' y='126' font-family='-apple-system,Helvetica,Arial' font-size='30' font-weight='400' fill='%230A84FF' text-anchor='middle'%3E’26%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
  :root{
    --bg:#FFFFFF; --bg2:#F2F2F7; --card:#FFFFFF; --grouped:#FFFFFF;
    --ink:#1D1D1F; --ink2:#3A3A3C; --muted:#8A8A8E; --muted2:#AEAEB2;
    --hair:#E5E5EA; --hair2:#EDEDF0;
    --blue:#0A84FF; --blue-press:#0070E0;
    --d1:#E8720C; --d2:#1FA64A; --d3:#D69A00; --d4:#E5443B;
    --sf:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --tabh:58px;
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg2);color:var(--ink);font-family:var(--sf);-webkit-font-smoothing:antialiased;
    line-height:1.45;letter-spacing:-.01em;
    padding-bottom:calc(var(--tabh) + env(safe-area-inset-bottom));overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:480px;margin:0 auto;position:relative;min-height:100vh}

  /* large nav title */
  .nav{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:.5px solid var(--hair);
    padding:calc(8px + env(safe-area-inset-top)) 18px 9px}
  .nav-sm{font-size:13px;color:var(--muted);font-weight:500;display:flex;justify-content:space-between;align-items:center}
  .nav-sm .pill{color:var(--blue);font-weight:600}
  .view{display:none;animation:fade .28s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){.view,.sheet{animation:none!important;transition:none!important}}

  .pad{padding:6px 18px 30px}
  h1.lg{font-size:32px;font-weight:700;letter-spacing:-.025em;margin:10px 0 2px}
  .sub{font-size:15px;color:var(--muted);margin:0 0 6px}

  /* hero countdown card */
  .hero{background:var(--ink);color:#fff;border-radius:20px;padding:22px 22px 20px;margin:14px 0 8px;position:relative;overflow:hidden}
  .hero .k{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#98989F;font-weight:600}
  .hero .count{font-size:52px;font-weight:700;letter-spacing:-.03em;line-height:1;margin:8px 0 2px;font-variant-numeric:tabular-nums}
  .hero .when{font-size:14px;color:#C7C7CC;margin-top:10px}
  .hero .when b{color:#fff;font-weight:600}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .stat{background:var(--card);border-radius:var(--r);padding:14px 16px;border:.5px solid var(--hair)}
  .stat .sk{font-size:12px;color:var(--muted);font-weight:500}
  .stat .sv{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-top:3px}
  .stat .sv small{font-size:13px;font-weight:500;color:var(--muted)}
  .ring{height:5px;background:var(--hair);border-radius:9px;margin-top:9px;overflow:hidden}
  .ring i{display:block;height:100%;background:var(--blue);border-radius:9px;transition:width .7s cubic-bezier(.22,1,.36,1)}

  /* section label (grouped list style) */
  .glabel{font-size:13px;color:var(--muted);font-weight:500;margin:24px 4px 7px;text-transform:none}
  .group{background:var(--card);border-radius:var(--r);border:.5px solid var(--hair);overflow:hidden}
  .row{display:flex;align-items:center;gap:13px;padding:12px 15px;border-bottom:.5px solid var(--hair);cursor:pointer;position:relative}
  .row:last-child{border-bottom:none}
  .row:active{background:var(--bg2)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .tile{width:42px;height:42px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:21px}
  .row .rt{flex:1;min-width:0}
  .row .rt .rn{font-size:16px;font-weight:600;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .rt .rd{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .row .chev{color:var(--muted2);font-size:17px;flex:none}
  .row .rtime{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;flex:none;margin-right:2px}
  .check{position:absolute;left:30px;top:30px;width:16px;height:16px;border-radius:50%;background:var(--d2);color:#fff;display:none;align-items:center;justify-content:center;font-size:10px;border:2px solid #fff}
  .row.done .check{display:flex}

  /* day chips on dashboard */
  .chips{display:flex;gap:8px;margin-top:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .chip{flex:none;border:.5px solid var(--hair);background:var(--card);border-radius:13px;padding:11px 13px;min-width:118px;cursor:pointer}
  .chip:active{background:var(--bg2)}
  .chip .cd{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:500}
  .chip .cn{font-size:15px;font-weight:600;letter-spacing:-.02em;margin-top:6px;line-height:1.15}
  .chip .cc{font-size:12px;color:var(--muted);margin-top:4px}

  .note{background:var(--card);border:.5px solid var(--hair);border-radius:var(--r);padding:15px 16px;font-size:14px;color:var(--ink2)}
  .note p{margin:0}.note p+p{margin-top:10px}
  .note b{font-weight:600;color:var(--ink)}

  /* itinerary day header */
  .dayhd{display:flex;align-items:center;gap:11px;margin:26px 4px 9px}
  .dayhd .dnum{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex:none}
  .dayhd .dh-t{font-size:19px;font-weight:700;letter-spacing:-.02em}
  .dayhd .dh-d{font-size:13px;color:var(--muted);margin-top:0}
  .dayhd .dh-r{margin-left:auto;font-size:12px;color:var(--muted);text-align:right;line-height:1.35}

  /* MAP tab */
  #mapFull{height:calc(100vh - var(--tabh) - env(safe-area-inset-bottom) - 112px);width:100%;background:var(--bg2)}
  .segwrap{padding:10px 18px 8px;background:var(--bg2)}
  .seg{display:flex;background:var(--bg2);border:.5px solid var(--hair);border-radius:11px;overflow:hidden;background:#E9E9EE}
  .seg button{flex:1;border:none;background:none;padding:8px 4px;font-family:var(--sf);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;border-radius:9px;margin:2px}
  .seg button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .leaflet-popup-content{margin:11px 13px;font-family:var(--sf)}
  .pop-n{font-weight:700;font-size:14px;letter-spacing:-.02em}
  .pop-d{font-size:12px;color:var(--muted);margin:2px 0 7px}
  .pop-b{display:inline-block;background:var(--blue);color:#fff;font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px}
  .pin{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);color:#fff;font-weight:700;font-size:12px;box-shadow:0 1px 4px rgba(0,0,0,.35);border:2px solid #fff}
  .pin span{transform:rotate(-45deg)}

  /* detail sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:60;opacity:0;pointer-events:none;transition:.25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:70;max-width:480px;margin:0 auto;background:var(--bg2);
    border-top-left-radius:14px;border-top-right-radius:14px;max-height:92vh;overflow-y:auto;
    transform:translateY(102%);transition:transform .36s cubic-bezier(.22,1,.36,1);
    padding-bottom:calc(28px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
  .sheet.open{transform:translateY(0)}
  .grab{width:36px;height:5px;border-radius:9px;background:#C7C7CC;margin:8px auto 0}
  .sheet-hero{height:150px;margin:12px 16px 0;border-radius:16px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
  .sheet-hero #sheetMap{position:absolute;inset:0}
  .sheet-glyph{position:absolute;top:12px;left:14px;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;background:rgba(255,255,255,.92);box-shadow:0 1px 4px rgba(0,0,0,.18);z-index:500}
  .sheet-hd{padding:14px 18px 4px}
  .sheet-eye{font-size:12px;font-weight:600;color:var(--muted)}
  .sheet-title{font-size:26px;font-weight:700;letter-spacing:-.03em;margin:3px 0 2px;line-height:1.06}
  .sheet-addr{font-size:13px;color:var(--muted)}
  .acts{display:flex;gap:9px;padding:13px 18px 6px}
  .act{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--card);border:.5px solid var(--hair);border-radius:12px;padding:11px;font-size:14px;font-weight:600;color:var(--blue);cursor:pointer}
  .act:active{background:var(--bg2)}
  .act.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .act.is-done{background:var(--d2);color:#fff;border-color:var(--d2)}
  .act svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

  .sec{margin:18px 18px 0}
  .sec-l{font-size:13px;color:var(--muted);font-weight:600;margin:0 2px 7px;display:flex;align-items:center;gap:7px}
  .sbox{background:var(--card);border:.5px solid var(--hair);border-radius:var(--r);padding:14px 16px}
  .sbox p{margin:0;font-size:15px;color:var(--ink2);line-height:1.5}
  .sbox.story p{font-size:15px;line-height:1.62}
  .ord{display:flex;gap:10px;padding:9px 0;border-bottom:.5px solid var(--hair)}
  .ord:first-child{padding-top:0}.ord:last-child{border-bottom:none;padding-bottom:0}
  .ord .om{flex:none;font-weight:700;color:var(--d3)}
  .ord .ox{font-size:14px;color:var(--ink2)}.ord .ox b{color:var(--ink);font-weight:600}
  .pay{display:flex;gap:9px;align-items:flex-start;margin-top:12px;padding-top:12px;border-top:.5px solid var(--hair);font-size:13.5px;color:var(--ink2)}
  .pay b{color:var(--ink);font-weight:600}
  .tip{display:flex;gap:10px;font-size:14px;color:var(--ink2);padding:8px 0;border-bottom:.5px solid var(--hair);line-height:1.45}
  .tip:first-child{padding-top:0}.tip:last-child{border-bottom:none;padding-bottom:0}
  .tip .tm{color:var(--blue);font-weight:700;flex:none}
  .nav-l{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--hair)}
  .nav-l:first-child{padding-top:0}.nav-l:last-child{border-bottom:none;padding-bottom:0}
  .nav-l .nx{font-size:13.5px;color:var(--ink2)}.nav-l .nx b{color:var(--ink);font-weight:600}
  .mb{width:21px;height:21px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11.5px;color:#fff;flex:none}
  .mb.blk{color:#1d1d1f}
  .bset{display:flex;gap:4px;flex-wrap:wrap}
  .nearrow{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:.5px solid var(--hair)}
  .nearrow:first-child{padding-top:0}.nearrow:last-child{border-bottom:none;padding-bottom:0}
  .nearrow .nglyph{font-size:18px;flex:none;margin-top:1px}
  .nearrow .nn{font-size:15px;font-weight:600}
  .nearrow .nd{font-size:13px;color:var(--muted);margin-top:1px}

  /* tabs */
  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:50;max-width:480px;margin:0 auto;height:calc(var(--tabh) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);border-top:.5px solid var(--hair);display:flex}
  .tab{flex:1;border:none;background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:var(--sf);font-size:10px;font-weight:500}
  .tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.8}
  .tab.active{color:var(--blue)}
  .foot{text-align:center;font-size:12px;color:var(--muted2);margin-top:26px;line-height:1.6}

  .tipcard{background:var(--card);border:.5px solid var(--hair);border-radius:var(--r);padding:15px 16px;margin-bottom:12px}
  .tipcard h3{font-size:17px;font-weight:700;letter-spacing:-.02em;margin:0 0 9px;display:flex;align-items:center;gap:9px}
  .tipcard li{font-size:14px;color:var(--ink2);margin-bottom:8px;list-style:none;padding-left:18px;position:relative;line-height:1.45}
  .tipcard li:last-child{margin-bottom:0}
  .tipcard li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--blue)}
  .tipcard ul{margin:0;padding:0}
  .install li{counter-increment:s;padding-left:27px}
  .install{counter-reset:s}
  .install li::before{content:counter(s);width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;left:0;top:1px}
  /* edit mode + add form */
  .ihead{display:flex;align-items:baseline;justify-content:space-between}
  .editbtn{color:var(--blue);font-weight:600;font-size:16px;background:none;border:none;cursor:pointer;padding:4px 0}
  .pitem{background:var(--card);border-bottom:.5px solid var(--hair)}
  .prow{display:flex;align-items:center;gap:11px;padding:11px 14px 8px}
  .notein{display:block;width:auto;margin:0 14px 11px 14px;font-family:var(--sf);font-size:13.5px;color:var(--ink2);background:var(--bg2);border:.5px solid var(--hair);border-radius:9px;padding:9px 11px}
  .notein::placeholder{color:var(--muted2)}
  .notebox{width:100%;min-height:66px;font-family:var(--sf);font-size:15px;color:var(--ink);border:none;outline:none;background:transparent;resize:vertical;line-height:1.5;padding:0}
  .rnote{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .field textarea.txt{width:100%;font-family:var(--sf);font-size:16px;padding:12px 14px;border:.5px solid var(--hair);border-radius:12px;background:var(--card);color:var(--ink);min-height:74px;resize:vertical;line-height:1.4}
  .field textarea.txt::placeholder{color:var(--muted2)}
  .results{margin-top:8px;border:.5px solid var(--hair);border-radius:12px;overflow:hidden;background:var(--card)}
  .sres{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:.5px solid var(--hair);cursor:pointer}
  .sres:last-child{border-bottom:none}
  .sres:active{background:var(--bg2)}
  .sres.muted{color:var(--muted);cursor:default;font-size:13px;display:block}
  .sres-t{flex:1;min-width:0}
  .sres-n{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sres-s{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .sres-map{flex:none;width:32px;height:32px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--blue);font-size:16px;text-decoration:none}
  .picknote{margin-top:8px;font-size:12.5px;color:var(--ink2);background:#EAF3FF;border-radius:9px;padding:9px 11px;line-height:1.4}
  .handle{color:#C7C7CC;font-size:22px;line-height:1;cursor:grab;touch-action:none;flex:none;padding:0 1px}
  .minus{width:23px;height:23px;border-radius:50%;background:#FF3B30;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;line-height:1;flex:none;cursor:pointer}
  .minus span{margin-top:-2px}
  .ptile{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:17px}
  .pname{flex:1;min-width:0;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .timein{font-family:var(--sf);font-size:14px;border:.5px solid var(--hair);border-radius:8px;padding:6px 8px;color:var(--ink);background:var(--bg2);flex:none}
  .addrow{display:flex;align-items:center;gap:9px;padding:13px 15px;color:var(--blue);font-weight:600;font-size:15px;cursor:pointer;background:var(--card)}
  .addrow:active{background:var(--bg2)}
  .addplus{width:22px;height:22px;border-radius:50%;background:#E3F0FF;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex:none}
  .sortable-ghost{opacity:.35}
  .sortable-chosen{background:var(--bg2)!important;box-shadow:0 4px 16px rgba(0,0,0,.12)}
  .sortable-drag{border-radius:12px}
  .hint{font-size:12px;color:var(--muted);margin:8px 4px 0;line-height:1.4}

  .field{margin:16px 18px 0}
  .field>label{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-bottom:7px}
  .field input.txt,.field input.tin{width:100%;font-family:var(--sf);font-size:16px;padding:12px 14px;border:.5px solid var(--hair);border-radius:12px;background:var(--card);color:var(--ink)}
  .glyphs{display:flex;gap:8px;flex-wrap:wrap}
  .gopt{width:46px;height:46px;border-radius:12px;border:.5px solid var(--hair);background:var(--card);font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .gopt.on{border-color:var(--blue);background:#EAF3FF}
  .sugg{display:flex;gap:8px;flex-wrap:wrap}
  .schip{border:.5px solid var(--hair);background:var(--card);border-radius:20px;padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
  .schip:active{background:var(--bg2)}
  .bigbtn{margin:20px 18px 4px;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:13px;font-family:var(--sf);font-size:16px;font-weight:600;width:calc(100% - 36px);cursor:pointer}
  .bigbtn:disabled{opacity:.4}

  /* travel-time connector between stops (Plan tab) */
  .leg{position:relative;display:flex;align-items:center;min-height:30px;
    padding:6px 15px 6px 64px;background:var(--card);border-bottom:.5px solid var(--hair);
    font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:-.01em}
  .leg::before{content:"";position:absolute;left:35px;top:0;bottom:0;width:2px;
    background:repeating-linear-gradient(var(--hair2) 0 3px,transparent 3px 6px)}
  .leg .lp{display:inline-flex;align-items:center;gap:5px}
  .leg .lg-ico{font-size:13px}
  /* out-of-order time warning under a stop name */
  .rwarn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--d4);
    font-weight:600;margin-top:2px}

  /* ===== PLACES (guidebook cards) ===== */
  body.wide .wrap{max-width:1180px}
  body.wide .tabs{max-width:1180px}
  .pfilters{margin:14px 0 2px}
  .pfilt-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch}
  .pchip{flex:none;border:.5px solid var(--hair);background:var(--card);border-radius:11px;
    padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;white-space:nowrap;
    transition:transform .12s ease}
  .pchip:active{transform:scale(.96)}
  .pchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pcount{font-size:13px;color:var(--muted);margin:4px 4px 14px}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;align-items:start}
  .pcard{background:var(--card);border:.5px solid var(--hair);border-radius:16px;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 8px 22px -18px rgba(0,0,0,.4)}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function to24(s){const m=String(s).match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);if(!m)return"12:00";let h=+m[1];const ap=(m[3]||"").toUpperCase();if(ap==="PM"&&h<12)h+=12;if(ap==="AM"&&h===12)h=0;return String(h).padStart(2,"0")+":"+m[2];}
function fmt(t){const p=String(t).split(":");let H=+p[0];const M=p[1]||"00";const ap=H>=12?"PM":"AM";let h=H%12;if(h===0)h=12;return h+":"+M+" "+ap;}

/* ===== ATMOSPHERE / MOTION ===== */
const REDUCED=window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches;
function nyParts(){
  /* current wall-clock time in New York, wherever the traveller is */
  const s=new Date().toLocaleString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit",hour12:true});
  const h=+new Date().toLocaleString("en-US",{timeZone:"America/New_York",hour:"numeric",hour12:false});
  return {label:s,hour:(h===24?0:h)};
}
function skyFor(hour){
  if(hour>=5&&hour<8)  return {g:"linear-gradient(160deg,#ffb27a,#7c8ed1)",part:"Dawn"};        /* sunrise   */
  if(hour>=8&&hour<16) return {g:"linear-gradient(160deg,#86c7ff,#cfe6ff)",part:"Daytime"};      /* clear day */
  if(hour>=16&&hour<20)return {g:"linear-gradient(160deg,#ff7e5f,#ff5e8a)",part:"Golden hour"};  /* sunset    */
  return {g:"linear-gradient(160deg,#2a3a76,#0a1026)",part:"Night"};                              /* night     */
}
function tickClock(){
  const els=document.querySelectorAll("[data-nyclock]");if(!els.length)return;
  const t=nyParts();els.forEach(e=>e.textContent=t.label);
  const sky=document.getElementById("pheroSky");if(sky)sky.style.background=skyFor(t.hour).g;
  const pt=document.querySelector("[data-nypart]");if(pt)pt.textContent=skyFor(t.hour).part;
}
let clockTimer=null;
function startClock(){tickClock();if(clockTimer)clearInterval(clockTimer);clockTimer=setInterval(tickClock,1000*20);}
function countUp(el,to,dur){
  if(!el)return; to=+to||0;
  if(REDUCED||to===0){el.textContent=to;return;}
  const start=performance.now();
  function step(now){const p=Math.min(1,(now-start)/dur);const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(e*to);if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}
/* subtle parallax: drift the hero photo as the page scrolls */
function bindParallax(){
  if(REDUCED)return;
  const onScroll=()=>{const img=document.querySelector("#phero .ph");if(!img)return;
    const y=Math.min(window.scrollY,260);img.style.translate="0 "+(y*0.18)+"px";};
  window.removeEventListener("scroll",window.__plx);window.__plx=onScroll;
  window.addEventListener("scroll",onScroll,{passive:true});onScroll();
}

/* ===== TRAVEL-TIME ESTIMATES =====
   Straight-line (haversine) distance → a rough but honest walk/subway estimate.
   No network needed: works offline from the coordinates already in the data. */
function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
/* legBetween: walk for short hops, otherwise a subway estimate.
   Walk pace ~4.5 km/h on a grid (≈13 min/km incl. lights/crossings).
   Subway model: ~8 min fixed (walk to platform + wait) + ~3 min/km riding. */
function legBetween(a,b){
  const da=dataOf(a),db=dataOf(b);
  if(da.lat==null||db.lat==null)return null;
  let km=haversineKm(da.lat,da.lng,db.lat,db.lng)*1.25; /* grid detour factor */
  const walk=Math.max(1,Math.round(km*13));
  if(walk<=22)return{mode:"walk",icon:"🚶",label:"walk",min:walk,km};
  const sub=Math.round(8+km*3);
  return{mode:"subway",icon:"🚇",label:"subway",min:sub,km};
}
function legPill(it,next){
  const lg=legBetween(it,next);
  if(!lg)return"";
  return `<div class="leg"><span class="lp"><span class="lg-ico">${lg.icon}</span>~${lg.min} min ${lg.label}</span></div>`;
}

/* ===== OVERVIEW ===== */
function getFocus(){
  const now=new Date(),arr=new Date(TRIP.arrival),dep=new Date(TRIP.depart);
  if(now<arr)return{mode:"count"};
  if(now>=dep)return{mode:"over"};
  const t=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  for(const d of DAYS){if(new Date(d.dateISO+"T00:00:00").getTime()===t)return{mode:"day",day:d,label:"Today"};}
  for(const d of DAYS){if(new Date(d.dateISO+"T00:00:00").getTime()>t)return{mode:"day",day:d,label:"Tomorrow"};}
  return{mode:"over"};
}

        <div class="rtime">${fmt(it.time)}</div><div class="chev">›</div></div>`;}).join("")
      :`<div class="row" style="color:var(--muted)">No stops planned — add some in the Plan tab.</div>`)+`</div>`;
  } else {
    hero=`<div class="phero" id="phero">${phLayer(dayPhoto('hero',1280))}${skyLayer}

      const warn=outOfOrder?`<div class="rwarn">⚠︎ earlier than the stop above</div>`:"";
      const row=`<div class="row ${v}" onclick="openSheet('${it.id}')">

        <div class="rtime">${fmt(it.time)}</div><div class="chev">›</div></div>`;
      return row+(i<arr.length-1?legPill(it,arr[i+1]):"");}).join("")
      :`<div class="row" style="color:var(--muted)">No stops yet — tap Edit to add one.</div>`;
  }
  return `<div class="daybanner" id="day${d.n}">${phLayer(dayPhoto(d.n,640))}
     <div class="daybanner-scrim" style="background:linear-gradient(105deg, ${d.hex}d9 0%, ${d.hex}45 44%, rgba(6,9,18,.6) 100%)"></div>
     <div class="grain"></div>
     <div class="daybanner-body">
       <div class="dnum">${d.n}</div>
       <div style="min-width:0"><div class="db-t">${d.title}</div><div class="db-d">${d.date}</div></div>
       <div class="db-r">${d.tag}</div>
     </div></div>
    <div class="group daygroup" data-day="${d.n}">${rows}</div>`;

let sortables=[];
function activateSortables(){
  sortables.forEach(s=>{try{s.destroy();}catch(e){}});sortables=[];
  document.querySelectorAll(".daygroup").forEach(g=>{
    const dayN=+g.dataset.day;
    sortables.push(new Sortable(g,{handle:".handle",draggable:".pitem",animation:160,
      onEnd:()=>{const ids=[...g.querySelectorAll(".pitem")].map(r=>r.dataset.id);
        plan[dayN]=ids.map(id=>plan[dayN].find(x=>x.id===id)).filter(Boolean);
        savePlan();renderDash();buildMarkers();}}));
  });
}
function setTime(dayN,id,val){const it=plan[dayN].find(x=>x.id===id);if(it&&val){it.time=val;savePlan();renderDash();buildMarkers();}}
function removeStop(dayN,id){plan[dayN]=plan[dayN].filter(x=>x.id!==id);savePlan();renderItin();renderDash();buildMarkers();}
function setNote(id,val){const f=findItem(id);if(f){f.it.notes=val;savePlan();}}

let addDay=1,addGlyph="⭐",_sug=[],_addPick=null,_results=[],searchTimer=null;
function openAdd(dayN){
  addDay=dayN;addGlyph="⭐";_addPick=null;_results=[];

  const seen=new Set();_sug=[];
  plan[dayN].forEach(it=>{const data=dataOf(it);(data.near||[]).forEach(n=>{if(!seen.has(n[1])){seen.add(n[1]);_sug.push(n);}});});

  const glyphs=["⭐","🍕","☕","🍽️","🍸","🏛️","🌳","🛍️","📷","🎭","🍦","🏙️"];

  if(_sug.length)h+=`<div class="field"><label>Suggestions nearby</label><div class="sugg">${_sug.map((n,i)=>`<div class="schip" onclick="fillSug(${i})">${n[0]} ${n[1]}</div>`).join("")}</div></div>`;

function pickGlyph(el,g){addGlyph=g;document.querySelectorAll("#addGlyphs .gopt").forEach(x=>x.classList.remove("on"));el.classList.add("on");}
function fillSug(i){const n=_sug[i];if(!n)return;const inp=document.getElementById("addName");inp.value=n[1];document.getElementById("addBtn").disabled=false;
  addGlyph=n[0];document.querySelectorAll("#addGlyphs .gopt").forEach(x=>x.classList.toggle("on",x.textContent.trim()===n[0]));}
function addStop(){
  const name=document.getElementById("addName").value.trim();if(!name)return;
  const time=document.getElementById("addTime").value||"12:00";
  const notes=(document.getElementById("addNotes").value||"").trim();
  const id="c"+Date.now();
  const item={id,custom:true,time,name,type:"Added by you",glyph:addGlyph,blurb:"",notes};
  if(_addPick){item.lat=_addPick.lat;item.lng=_addPick.lng;item.addr=_addPick.display;item.q=_addPick.display;}
  else item.q=name+" New York";
  plan[addDay].push(item);
  savePlan();closeSheet();renderItin();renderDash();buildMarkers();
  setTimeout(()=>{const el=document.getElementById("day"+addDay);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},140);

async function searchPlaces(q){
  const url=`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=6&lang=en&lat=40.75&lon=-73.98`;
  const res=await fetch(url);if(!res.ok)return[];
  const j=await res.json();
  return (j.features||[]).map(f=>{const p=f.properties||{},c=(f.geometry&&f.geometry.coordinates)||[];
    const main=p.name||p.street||p.city||"Place";
    const sub=[(p.housenumber&&p.street)?(p.housenumber+" "+p.street):p.street,p.city,p.state,p.country].filter(Boolean).join(", ");
    return{lat:c[1],lng:c[0],name:main,sub,display:main+(sub?(", "+sub):"")};}).filter(x=>x.lat!=null);
}
function onAddSearch(val){
  _addPick=null;document.getElementById("pickNote").style.display="none";
  document.getElementById("addBtn").disabled=!val.trim();
  const box=document.getElementById("addResults");
  clearTimeout(searchTimer);
  if(val.trim().length<3){box.style.display="none";box.innerHTML="";return;}
  box.style.display="block";box.innerHTML='<div class="sres muted">Searching…</div>';
  searchTimer=setTimeout(async()=>{
    try{const r=await searchPlaces(val.trim());_results=r;
      if(!r.length){box.innerHTML='<div class="sres muted">No matches — you can still add this as a custom stop.</div>';return;}
      box.innerHTML=r.map((p,i)=>`<div class="sres" onclick="pickResult(${i})"><div class="sres-t"><div class="sres-n">${esc(p.name)}</div><div class="sres-s">${esc(p.sub||p.display)}</div></div><a class="sres-map" href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗</a></div>`).join("");
    }catch(e){box.innerHTML='<div class="sres muted">Search needs a connection — type a name to add it manually.</div>';}
  },350);
}
function pickResult(i){
  const p=_results[i];if(!p)return;
  _addPick={lat:p.lat,lng:p.lng,name:p.name,display:p.display};
  document.getElementById("addName").value=p.name;
  document.getElementById("addBtn").disabled=false;
  const box=document.getElementById("addResults");box.style.display="none";box.innerHTML="";
  const pn=document.getElementById("pickNote");pn.style.display="block";pn.textContent="📍 "+p.display;
}

/* ===== MAP ===== */
let bigMap=null,markers={},mapFilter=0;
function pinIcon(hex,glyph){return L.divIcon({className:"",html:`<div class="pin" style="background:${hex}"><span>${glyph||""}</span></div>`,iconSize:[26,26],iconAnchor:[13,24],popupAnchor:[0,-22]});}
function buildMarkers(){
  if(!bigMap)return;
  Object.values(markers).forEach(o=>o.m.remove());markers={};
  DAYS.forEach(d=>plan[d.n].forEach((it,i)=>{const st=dataOf(it);if(st.lat==null)return;
    const m=L.marker([st.lat,st.lng],{icon:pinIcon(d.hex,i+1)});
    m.bindPopup(`<div class="pop-n">${st.glyph} ${st.name}</div><div class="pop-d">Day ${d.n} · ${fmt(it.time)}</div><span class="pop-b" onclick="closePopupOpen('${it.id}')">View details ›</span>`);
    markers[it.id]={m,day:d.n};
    if(mapFilter===0||mapFilter===d.n)m.addTo(bigMap);}));
}
function initMap(){
  bigMap=L.map("mapFull",{zoomControl:true,attributionControl:true}).setView([40.745,-73.99],12.2);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:'© OpenStreetMap, © CARTO'}).addTo(bigMap);
  buildMarkers();
  document.getElementById("dayseg").innerHTML=`<button class="on" onclick="filterDay(0,this)">All</button>`+DAYS.map(d=>`<button onclick="filterDay(${d.n},this)">Day ${d.n}</button>`).join("");
}
function fitAll(pad){const pts=[];DAYS.forEach(d=>plan[d.n].forEach(it=>{const st=dataOf(it);if(st.lat!=null)pts.push([st.lat,st.lng]);}));if(pts.length)bigMap.fitBounds(L.latLngBounds(pts),{padding:[pad,pad]});}
function filterDay(n,btn){
  mapFilter=n;document.querySelectorAll("#dayseg button").forEach(b=>b.classList.remove("on"));btn.classList.add("on");
  const pts=[];
  DAYS.forEach(d=>plan[d.n].forEach(it=>{const o=markers[it.id];if(!o)return;
    if(n===0||o.day===n){o.m.addTo(bigMap);const st=dataOf(it);pts.push([st.lat,st.lng]);}else o.m.remove();}));
  if(pts.length)bigMap.fitBounds(L.latLngBounds(pts),{padding:[50,50],maxZoom:14});
}
function closePopupOpen(id){bigMap.closePopup();openSheet(id);}

/* ===== PLACES (guidebook) ===== */
let placesCat="All",placesDay=0;
const PLACE_CATS=["All","Food","Landmarks","Parks","Campuses"];
const gmapsTransit=q=>`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(q)}&travelmode=transit`;
function placeList(){const a=[];DAYS.forEach(d=>d.stops.forEach(id=>{if(S[id])a.push({id,dayN:d.n,day:d});}));return a;}
function mealOf(t24){const h=+String(t24).split(":")[0];if(h<11)return"breakfast";if(h<15)return"lunch";if(h<18)return"afternoon";return"evening";}
function timingLabel(day,t24){const wd=new Date(day.dateISO+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});return wd+" "+mealOf(t24);}
function hoodOf(data){const p=(data.addr||"").split(",");return p.length>1?p[p.length-1].trim():"";}
function famousPicks(data){if(data.order&&data.order.length)return data.order.map(o=>o[1]).join(", ")+".";return data.blurb?data.blurb+".":"";}
function subwayLineSet(data){const seen=new Set(),out=[];(data.subway||[]).forEach(e=>e[0].split(" ").forEach(l=>{if(!seen.has(l)){seen.add(l);out.push(l);}}));return out;}
function subwayText(data){return (data.subway||[]).map(e=>e[1]).join(" · ");}
const FIELD_NOTES=[
 ["Transit","Use the same contactless card or phone for every OMNY tap to benefit from fare capping. Subway/bus base fare is about $2.90. Check live service before weekend rides."],
 ["Food carts","Ask the price before ordering, especially around tourist zones. Small cash is useful, but do not assume a cart is cash-only."],
 ["Times Square","Costumed characters expect tips for photos. Agree a price first, or just keep walking — and watch your pockets."],
 ["Pacing","Plan one anchor meal and one anchor sight per half-day. NYC rewards wandering but punishes cross-town zigzags."],
 ["Parks","Central Park is best in the morning. Washington Square is best when you have time to sit and watch."],
 ["Campus visits","Columbia and NYU building access can be limited. Treat both as architecture and neighborhood walks unless you confirm visitor access."],
 ["Photos","The Brooklyn Bridge is calmer early. For the classic skyline shot, finish in DUMBO and walk down to Pebble Beach."],
 ["Money","Use tap-to-pay for transit and most venues. Carry $20–$40 in small bills for carts, tips and backup."],
];
const ADDONS=[["Near Levain + Central Park","levain"],["Near Columbia","columbia"],["Near NYU + Washington Square","nyu"],["Near Wall Street","wallst"],["Near Brooklyn Bridge","bridge"],["Near Times Square","times"]];

function placeCard(e){
  const data=S[e.id],d=e.day,m=PLACE_MEDIA[e.id]||{};
  const cat=placeCat(data);
  const hood=hoodOf(data)||d.title;
  const timing=timingLabel(d,to24(data.time));
  const pay=data.pay||"Mostly free. Tap-to-pay covers transit, cafés and snacks nearby.";
  const need=data.know||data.story||data.blurb||"";
  const move=(data.tips&&data.tips[0])||"";
  const picks=famousPicks(data);
  const q=data.q||data.name;
  const lines=subwayLineSet(data).map(l=>{const c=lineColor[l]||"#777";const b=blkText.has(l)?" blk":"";return `<span class="mb${b}" style="background:${c}">${l}</span>`;}).join("");
  return `<div class="pcard" data-cat="${cat}" data-day="${e.dayN}">
    <div class="pcard-img" style="background:linear-gradient(150deg, ${d.hex}, ${d.hex}99)">
      ${m.img?phLayer(m.img):""}<div class="pcard-glyph">${data.glyph||"⭐"}</div>
      <div class="pcard-cat">${cat}</div></div>
    <div class="pcard-body">
      <div class="pcard-meta"><span>${esc(hood)}</span><span class="pm-time">${timing}</span></div>
      <div class="pcard-name">${esc(data.name)}</div>
      <div class="pcard-addr">${esc(data.addr||"")}</div>
      ${lines?`<div class="pcard-lines">${lines}</div>`:""}
      ${picks?`<div class="pc-sec"><div class="pc-k">Famous picks</div><div class="pc-v">${picks}</div></div>`:""}
      ${need?`<div class="pc-sec"><div class="pc-k">Need to know</div><div class="pc-v">${need}</div></div>`:""}
      ${move?`<div class="pc-sec"><div class="pc-k">Insider move</div><div class="pc-v">${move}</div></div>`:""}
      <div class="pc-sec"><div class="pc-k">Payment</div><div class="pc-v">${pay}</div></div>
      ${subwayText(data)?`<div class="pc-sec"><div class="pc-k">Subway</div><div class="pc-v">${subwayText(data)}</div></div>`:""}
      ${data.near?`<div class="pc-sec"><div class="pc-k">Nearby</div><div class="pc-v">${data.near.map(n=>esc(n[1])).join(", ")}.</div></div>`:""}
      <div class="pc-acts">
        <a class="pc-btn" href="${gmapsDir(q)}" target="_blank" rel="noopener">Open Maps</a>
        <a class="pc-btn" href="${gmapsTransit(q)}" target="_blank" rel="noopener">Transit</a>
        ${m.src?`<a class="pc-btn" href="${m.src}" target="_blank" rel="noopener">Source</a>`:""}
      </div>
    </div></div>`;
}
function renderPlaces(){
  const list=placeList();
  const shown=list.filter(e=>{const okC=placesCat==="All"||placeCat(S[e.id])===placesCat;const okD=placesDay===0||e.dayN===placesDay;return okC&&okD;});
  const catRow=PLACE_CATS.map(c=>`<div class="pchip ${placesCat===c?'on':''}" onclick="setPCat('${c}')">${c}</div>`).join("");
  const dayRow=`<div class="pchip ${placesDay===0?'on':''}" onclick="setPDay(0)">All days</div>`+
    DAYS.map(d=>`<div class="pchip ${placesDay===d.n?'on':''}" onclick="setPDay(${d.n})">Day ${d.n}</div>`).join("");
  const cards=shown.length?`<div class="pgrid">${shown.map(placeCard).join("")}</div>`
    :`<div class="pcount">No places match this filter.</div>`;
  document.getElementById("placesPad").innerHTML=`
   <h1 class="lg">Places</h1>
   <p class="sub">What to know at each stop.</p>
   <div class="pfilters">
     <div class="pfilt-row">${catRow}</div>
     <div class="pfilt-row">${dayRow}</div>
   </div>
   <div class="pcount">${shown.length} place${shown.length===1?"":"s"}</div>
   ${cards}
   <div class="glabel" style="margin-top:30px">Field notes · small things that save time</div>
   <div class="fgrid">${FIELD_NOTES.map(f=>`<div class="fnote"><h4>${f[0]}</h4><p>${f[1]}</p></div>`).join("")}</div>
   <div class="glabel" style="margin-top:26px">Nearby add-ons · flexible extras</div>
   <div class="fgrid">${ADDONS.map(a=>{const dd=S[a[1]];return `<div class="fnote"><h4>${esc(a[0])}</h4><p>${(dd.near||[]).map(n=>esc(n[1])).join(", ")}.</p></div>`;}).join("")}</div>
   <div class="foot">Photos & facts via Wikipedia / Wikimedia Commons.</div>`;
}
function setPCat(c){placesCat=c;renderPlaces();}
function setPDay(n){placesDay=n;renderPlaces();}

/* ===== NAV ===== */
const titles={dashboard:["New York City","Jun 16–21"],itinerary:["Itinerary","Edit to customize"],map:["Map","Your stops"],tips:["Guide",""],places:["Places","Guidebook"]};
function show(tab){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+tab).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===tab));
  document.body.classList.toggle("wide",tab==="places");
  document.getElementById("navLeft").textContent=titles[tab][0];
  document.getElementById("navRight").textContent=titles[tab][1];
  if(tab==="map"){if(!bigMap)initMap();setTimeout(()=>{bigMap.invalidateSize();if(mapFilter===0)fitAll(40);},120);}
  if(tab!=="map")window.scrollTo(0,0);
}
function goDay(n){show("itinerary");setTimeout(()=>{const el=document.getElementById("day"+n);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},80);}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>show(t.dataset.tab)));
document.getElementById("scrim").addEventListener("click",closeSheet);

/* ===== APPLE POLISH — haptics + sheet gestures ===== */
function hapt(ms){try{if(navigator.vibrate)navigator.vibrate(ms||7);}catch(e){}}
/* one delegated listener → subtle tap feedback on every key control (no-op on iOS Safari) */
document.addEventListener("click",e=>{
  if(e.target.closest(".tab,.pchip,.act,.pc-btn,.row,.chip,.schip,.gopt,.addrow,.editbtn,.bigbtn,.seg button,.sugg .schip"))hapt(7);
},{passive:true});
/* swipe-down-to-dismiss the bottom sheet + Escape to close */
(function(){
  const sheet=document.getElementById("sheet");if(!sheet)return;
  let sy=0,cy=0,drag=false;
  sheet.addEventListener("touchstart",e=>{
    if(sheet.scrollTop>3){drag=false;return;}
    sy=cy=e.touches[0].clientY;drag=true;sheet.style.transition="none";
  },{passive:true});
  sheet.addEventListener("touchmove",e=>{
    if(!drag)return;cy=e.touches[0].clientY;const dy=cy-sy;
    if(dy>0)sheet.style.transform="translateY("+(dy*0.92)+"px)";
  },{passive:true});
  sheet.addEventListener("touchend",()=>{
    if(!drag)return;drag=false;sheet.style.transition="";sheet.style.transform="";
    if(cy-sy>120){hapt(11);closeSheet();}
  },{passive:true});
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeSheet();});
})();

renderDash();renderItin();renderTips();renderPlaces();
</script>
